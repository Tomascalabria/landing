name: MeLi Price Monitor

on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 minutos
  workflow_dispatch:          # también se puede lanzar a mano desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r meli_monitor/requirements.txt

      - name: Restaurar precios anteriores
        uses: actions/cache@v4
        with:
          path: meli_monitor/.last_prices.json
          key: last-prices-${{ github.run_id }}
          restore-keys: last-prices-

      - name: Correr monitor
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python meli_monitor/monitor.py --sheets

      - name: Guardar precios actuales
        uses: actions/cache/save@v4
        with:
          path: meli_monitor/.last_prices.json
          key: last-prices-${{ github.run_id }}
